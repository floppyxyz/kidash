services:
  kidash:
    build: .
    ports:
      - "3100:3000"
    volumes:
      - kidash-data:/data
      - ./themes:/app/themes:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=file:/data/kidash.db
    restart: unless-stopped

volumes:
  kidash-data:
